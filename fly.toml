# fly.toml app configuration file generated for ai-mock-interviews-fullstack on 2026-04-19T23:49:39+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-mock-interviews-fullstack'
primary_region = 'fra'

[build]

[processes]
  app = "api"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  path = "/health"
  grace_period = "30s"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
